  # ============================================================================
  # Stage 7: Fly.io Cloud 部署 (Fly.io 雲端方案)
  # ============================================================================
  - stage: Deploy_FlyIO
    displayName: '部署至 Fly.io 雲端平台'
    dependsOn: []
    condition: and(succeeded(), eq('${{ parameters.deployFlyIO }}', 'true'))
    jobs:
      - job: Deploy
        displayName: '執行 Fly.io 部署'
        steps:
          # 1. 驗證 Build ID 格式
          - bash: |
              BUILD_NO="${{ parameters.buildNo }}"
              if [ -n "$BUILD_NO" ] && ! [[ "$BUILD_NO" =~ ^[0-9]+$ ]]; then
                  echo "=========================================================================="
                  echo "[ERROR] 輸入的 CI Build No. '$BUILD_NO' 不是有效的整數 Build ID。"
                  echo "Azure DevOps 需要的是數值型態的 Build ID（例如 12345），而非版本字串（例如 20260630.1）。"
                  echo ""
                  echo "如何取得數值型態的 Build ID："
                  echo "1. 點進您的 CI 流水線該次執行記錄。"
                  echo "2. 查看網頁網址（URL），尾端會顯示 '?buildId=XXXXX'。"
                  echo "3. 請複製該 XXXXX 數字，並填入 CD 流水線的 buildNo 參數中。"
                  echo "=========================================================================="
                  exit 1
              fi
            displayName: '驗證 Build ID 格式'

          - task: DownloadBuildArtifacts@1
            displayName: '下載 PROD 專用 Artifact'
            inputs:
              buildType: 'specific'
              project: '$(System.TeamProject)'
              definition: '$(ciPipeline)'
              ${{ if eq(parameters.buildNo, '') }}:
                buildVersionToDownload: 'latest'
              ${{ else }}:
                buildVersionToDownload: 'specific'
                buildId: '$(buildIdToDownload)'
              downloadType: 'single'
              artifactName: 'Madaga-Artifacts'
              downloadPath: '$(Pipeline.Workspace)/drop'

          - bash: |
              # 優先尋找 prod 資料夾，若不存在則尋找 dev, sit, uat 資料夾
              if [ -d "$(Pipeline.Workspace)/drop/Madaga-Artifacts/prod" ]; then
                  cd "$(Pipeline.Workspace)/drop/Madaga-Artifacts/prod"
              elif [ -d "$(Pipeline.Workspace)/drop/Madaga-Artifacts/dev" ]; then
                  cd "$(Pipeline.Workspace)/drop/Madaga-Artifacts/dev"
              elif [ -d "$(Pipeline.Workspace)/drop/Madaga-Artifacts/sit" ]; then
                  cd "$(Pipeline.Workspace)/drop/Madaga-Artifacts/sit"
              elif [ -d "$(Pipeline.Workspace)/drop/Madaga-Artifacts/uat" ]; then
                  cd "$(Pipeline.Workspace)/drop/Madaga-Artifacts/uat"
              else
                  echo "[ERROR] No deployment environment folder (prod, dev, sit, uat) found in artifacts!"
                  exit 1
              fi
              
              echo "Working directory: $(pwd)"
              
              if [ ! -f "fly.toml" ] || [ ! -f "Dockerfile" ]; then
                  echo "[ERROR] fly.toml or Dockerfile not found in artifacts!"
                  exit 1
              fi
              
              # 驗證 FLY_API_TOKEN 是否有正確設定
              if [ -z "$FLY_API_TOKEN" ] || [ "$FLY_API_TOKEN" = "\$(FLY_API_TOKEN)" ]; then
                  echo "=========================================================================="
                  echo "[ERROR] 未設定或無效的 FLY_API_TOKEN。"
                  echo "請在 Azure DevOps 該 CD 流水線的 Variables（變數）或 Variable Group（變數群組）中，"
                  echo "新增一個名為 'FLY_API_TOKEN' 的變數，並填入您的 Fly.io API Token。"
                  echo "=========================================================================="
                  exit 1
              fi
              
              # 確保 flyctl 可用，使用絕對路徑或加到 PATH
              export PATH=$PATH:$HOME/.fly/bin
              
              echo "Deploying to Fly.io..."
              flyctl deploy --local-only
            displayName: '執行 flyctl deploy'
            env:
              FLY_API_TOKEN: $(FLY_API_TOKEN)
