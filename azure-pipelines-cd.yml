  # ============================================================================
  # Stage 4: PROD 部署 (Port 80 或 Port 443 SSL)
  # ============================================================================
  - stage: Deploy_PROD
    displayName: '部署至 PROD 環境'
    dependsOn: []
    condition: and(succeeded(), eq('${{ parameters.deployProd }}', 'true'))
    jobs:
      - job: Deploy
        displayName: '執行 PROD 部署'
        steps:
          # 1. 驗證 Build ID 格式
          - bash: |
