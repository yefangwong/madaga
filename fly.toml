# fly.toml app configuration file for csp-portal
app = "csp-portal"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  MADAGA_HOME = "/app"
  NLP_HOST = "http://localhost"
  NLP_PORT = "9000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
