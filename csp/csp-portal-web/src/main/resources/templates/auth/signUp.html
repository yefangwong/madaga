<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
    <meta name="generator" content="Hugo 0.88.1">
    <title>Signin Template · Bootstrap v5.1</title>

    <link rel="canonical" href="https://getbootstrap.com/docs/5.1/examples/sign-in/">



    <!-- Bootstrap core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

    <style>
      .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }
    </style>


    <!-- Custom styles for this template -->
    <link th:href="@{/css/signin.css}" rel="stylesheet">
</head>
<body class="text-center">

<main class="form-signin" style="background: rgba(255, 255, 255, 0.9); border-radius: 12px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 30px;">
    <form th:action="@{/auth/signIn}" method="POST">
        <!-- SVG Shield Security Logo -->
        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="mb-4" style="color: #198754; margin: 0 auto;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.622 5.176-13.32 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
        </svg>
        <h1 class="h3 mb-3 fw-normal" style="font-weight: 500;">Please sign in</h1>

        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3" style="font-size: 0.85rem;" role="alert">
            Invalid email or password.
        </div>
        
        <div th:if="${param.logout}" class="alert alert-success py-2 mb-3" style="font-size: 0.85rem;" role="alert">
            You have been signed out.
        </div>

        <div class="form-floating mb-2">
            <input type="email" class="form-control" id="floatingInput" name="username" placeholder="name@example.com" required>
            <label for="floatingInput">Email address</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password" required>
            <label for="floatingPassword">Password</label>
        </div>

        <div class="checkbox mb-3">
            <label>
                <input type="checkbox" name="remember-me" value="true"> Remember me
            </label>
        </div>
        <button class="w-100 btn btn-lg btn-success" type="submit" style="background-color: #198754; border-color: #198754; font-weight: 500; transition: all 0.3s ease;">Sign in</button>
        <p class="mt-5 mb-3 text-muted">&copy; 2017–2026 Madaga Portal</p>
    </form>
</main>

</body>
</html>
