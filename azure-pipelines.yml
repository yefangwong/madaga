# azure-pipelines.yml
# ADO CI/CD configuration for Madaga Enterprise AI Sandbox

trigger:
  branches:
    include:
      - develop
      - master

pool:
  name: 'Default' # Local Mac Self-hosted agent

variables:
  mavenPOMFile: 'pom.xml'
  javaVersion: '17'

steps:
# JavaToolInstaller is removed because the Mac already has Java configured.

- task: Maven@4
  displayName: 'Maven Build & Test'
  inputs:
    mavenPomFile: '$(mavenPOMFile)'
    mavenOptions: '-Xmx3072m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    # 使用 -Dmaven.test.skip=true 加速沙盒環境建置，未來若要執行單元測試可移除
    goals: 'clean install -Dmaven.test.skip=true'

- task: CopyFiles@2
  displayName: 'Stage built artifacts & deploy configs'
  inputs:
    SourceFolder: '$(system.defaultworkingdirectory)'
    Contents: |
      **/target/*.war
      csp/csp-domain-jpa/src/main/resources/database/dhf/dhf.sqlite
      Dockerfile
      fly.toml
      .dockerignore
    TargetFolder: '$(build.artifactstagingdirectory)'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifacts to Pipeline Drop'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
    ArtifactName: 'Madaga-Artifacts'
    publishLocation: 'Container'
