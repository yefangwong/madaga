# ==============================================================================
# nginx-prod.conf - Nginx Reverse Proxy Template for Madaga CSP Portal (PROD)
# ==============================================================================
# 說明：
# 1. 本檔案供方案 A（Nginx 反向代理 SSL）部署參考。
# 2. 將此檔案放置於 Nginx 設定目錄下（例如 /etc/nginx/conf.d/csp-portal.conf），
#    並替換 <domain_name> 與 SSL 憑證路徑。
# ==============================================================================

# HTTP (Port 80) - 自動導向 HTTPS (Port 443)
server {
    listen 80;
    listen [::]:80;
    server_name localhost yourdomain.com; # 替換為您的網域

    # 強制將所有 HTTP 請求重導向至 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS (Port 443) - SSL 反向代理
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost yourdomain.com; # 替換為您的網域

    # SSL 憑證配置 (替換為您的憑證路徑)
    ssl_certificate     /etc/ssl/certs/madaga_csp.crt;
    ssl_certificate_key /etc/ssl/private/madaga_csp.key;

    # SSL 安全性設定建議
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 檔案上傳大小限制 (視需求調整)
    client_max_body_size 50M;

    # 反向代理轉發至 Spring Boot (PROD 預設後端 Port: 8081)
    location / {
        proxy_pass http://127.0.0.1:8081;
        
        # 傳遞用戶端真實 IP 與主機資訊
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 防止瀏覽器在 HTTPS 網頁中載入 HTTP 靜態資源的 Mixed Content 警告
        proxy_set_header X-Forwarded-Port 443;

        # 斷開連線超時設定
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }

    # ==========================================================================
    # 專門為 AI Chat Streaming (SSE - Server-Sent Events) 優化的 Location
    # ==========================================================================
    # 若 AI 串流對話被中斷或有延遲，請確保 Nginx 關閉快取緩衝
    location /api/ai/ {
        proxy_pass http://127.0.0.1:8081;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 核心：關閉 Nginx Buffer 以實現即時 Token 串流輸出
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # 延長讀取超時，避免長對話因等待 model 回覆而斷開
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
